<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>HxWell Framework - Modern Web Framework for Haxe</title>
    <meta name="title" content="HxWell Framework - Modern Web Framework for Haxe" />
    <meta name="description"
        content="A modern, high-performance web framework for Haxe developers. Build scalable applications with elegant syntax and unmatched speed." />
    <meta name="keywords"
        content="haxe, web framework, hxwell, web development, backend, performance, server, scalable" />
    <meta name="author" content="HxWell" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hxwell.org/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hxwell.org/" />
    <meta property="og:title" content="HxWell Framework - Modern Web Framework for Haxe" />
    <meta property="og:description"
        content="A modern, high-performance web framework for Haxe developers. Build scalable applications with elegant syntax and unmatched speed." />
    <meta property="og:site_name" content="HxWell" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hxwell.org/" />
    <meta property="twitter:title" content="HxWell Framework - Modern Web Framework for Haxe" />
    <meta property="twitter:description"
        content="A modern, high-performance web framework for Haxe developers. Build scalable applications with elegant syntax and unmatched speed." />

    <!-- Use Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f89c0e;
            --primary-glow: rgba(248, 156, 14, 0.4);
            --bg-dark: #0b0f19;
            --bg-light: #161e2e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(248, 156, 14, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* Ambient background glow */
        .ambient-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 60%);
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            filter: blur(80px);
            animation: pulse-light 8s ease-in-out infinite alternate;
        }

        @keyframes pulse-light {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.15;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.25;
            }
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 680px;
            width: 100%;
            text-align: center;
            animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slide-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .logo {
            width: 96px;
            height: auto;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 10px 15px rgba(248, 156, 14, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1.2rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 span {
            color: var(--primary);
            background: linear-gradient(135deg, #f89c0e, #ff6b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: clamp(1.1rem, 2vw, 1.25rem);
            line-height: 1.6;
            color: var(--text-muted);
            margin: 0 auto 2.5rem;
            max-width: 520px;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0));
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .btn:hover::after {
            transform: translateX(100%);
        }

        .btn-primary {
            background: var(--primary);
            background: linear-gradient(135deg, var(--primary) 0%, #e68d00 100%);
            color: var(--bg-dark);
            box-shadow: 0 10px 25px -5px var(--primary-glow), 0 8px 10px -6px var(--primary-glow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -5px var(--primary-glow), 0 10px 15px -5px var(--primary-glow);
        }

        .btn-github {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn-github:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3);
        }

        .btn-github svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform 0.3s;
        }

        .btn-github:hover svg {
            transform: scale(1.1) rotate(5deg);
        }

        .version {
            margin-top: 3.5rem;
            font-size: 0.9rem;
            color: #475569;
            font-weight: 500;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .version-badge {
            background: rgba(248, 156, 14, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid rgba(248, 156, 14, 0.2);
        }

        @media (max-width: 640px) {
            .container {
                padding: 3rem 1.5rem;
            }

            .actions {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }
        }

        .online-badge {
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #f89c0e;
            /* Connecting (orange) */
            box-shadow: 0 0 8px rgba(248, 156, 14, 0.6);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .status-dot.connected {
            background-color: #10b981;
            /* Green */
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        .status-dot.disconnected {
            background-color: #ef4444;
            /* Red */
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }
    </style>
</head>

<body>
    <div class="ambient-light"></div>

    <main class="container">
        <div class="logo-container">
            <img src="hxwell.svg" alt="HxWell Logo" class="logo" />
        </div>

        <h1>Welcome to <span>HxWell</span></h1>

        <p>
            A modern, high-performance web framework for Haxe developers.
            Build scalable applications with elegant syntax and unmatched speed.
        </p>

        <div class="actions">
            <a href="https://api.hxwell.org/" target="_blank" class="btn btn-primary" aria-label="Read Documentation">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                Read Docs
            </a>

            <a href="https://github.com/hxwell/hxwell" target="_blank" class="btn btn-github"
                aria-label="View on GitHub">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                </svg>
                GitHub
            </a>
        </div>

        <div class="version">
            © 2026 HxWell Framework <span class="version-badge">v0.1.0</span>
        </div>

        <div id="online-count" class="online-badge">
            <span id="status-dot" class="status-dot"></span>
            <span id="online-text">Connecting...</span>
        </div>
    </main>

    <script>
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(protocol + '//' + window.location.host + '/online');
            const statusDot = document.getElementById('status-dot');
            const onlineText = document.getElementById('online-text');

            ws.onopen = () => {
                statusDot.className = 'status-dot connected';
                onlineText.innerText = 'Online: ...';
            };

            ws.onmessage = (event) => {
                onlineText.innerText = 'Online: ' + event.data;
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                onlineText.innerText = 'Disconnected (reconnecting...)';
                setTimeout(connect, 3000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        connect();
    </script>
</body>

</html>
